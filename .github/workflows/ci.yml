# Karsa ASM — CI Pipeline
# Runs linting (ruff), testing (pytest), and Docker image build.
name: ci

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv venv --clear && uv pip install -r requirements.txt

      - name: Ruff lint check
        run: ruff check app/ tests/

      - name: Run tests
        run: |
          python -m pytest tests/ \
            --cov=app --cov-report=term-missing

      - name: Check coverage threshold
        run: |
          python -m pytest tests/ \
            --cov=app --cov-fail-under=70 2>&1 | tail -5

  docker:
    name: Docker Build
    runs-on: ubuntu-22.04
    needs: [lint-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: karsa-asm:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Verify image exists
        run: docker image inspect karsa-asm:ci-${{ github.sha }} | jq -r '.[0].RepoTags[0]'
