<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3F7FB"/>
      <stop offset="1" stop-color="#E4ECF5"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FBFF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#204A72" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1C4F80"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5E7E9D"/>
    </marker>
    <style>
      .title { font: 700 40px Arial, Helvetica, sans-serif; fill: #123D63; }
      .subtitle { font: 400 18px Arial, Helvetica, sans-serif; fill: #4B6783; }
      .group-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #123D63; }
      .box-title { font: 700 20px Arial, Helvetica, sans-serif; fill: #123D63; }
      .box-copy { font: 400 16px Arial, Helvetica, sans-serif; fill: #3E5D7D; }
      .small-copy { font: 400 15px Arial, Helvetica, sans-serif; fill: #4B6783; }
      .label { font: 700 15px Arial, Helvetica, sans-serif; fill: #1C4F80; letter-spacing: 0.08em; }
      .box { fill: url(#panel); stroke: #B9CCE0; stroke-width: 2; rx: 24; filter: url(#shadow); }
      .box-accent { fill: #1C4F80; opacity: 0.08; }
      .arrow { stroke: #1C4F80; stroke-width: 5; stroke-linecap: round; marker-end: url(#arrow); }
      .arrow-muted { stroke: #5E7E9D; stroke-width: 4; stroke-linecap: round; stroke-dasharray: 10 10; marker-end: url(#arrowMuted); }
      .pill { fill: #EAF2FB; stroke: #B9CCE0; stroke-width: 1.5; rx: 12; }
    </style>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="160" cy="160" r="120" fill="#FFFFFF" opacity="0.55"/>
  <circle cx="1470" cy="920" r="180" fill="#D8E6F4" opacity="0.55"/>
  <circle cx="1350" cy="170" r="110" fill="#FFFFFF" opacity="0.7"/>

  <text x="90" y="92" class="title">Karsa ASM Workflow</text>
  <text x="90" y="126" class="subtitle">Read Global, Execute Local architecture based on the approved system flow in docs/ARCHITECTURE.md</text>

  <image href="karsa_asm_logo.jpg" x="1300" y="36" width="220" height="220" preserveAspectRatio="xMidYMid meet"/>

  <rect x="70" y="180" width="1460" height="735" rx="34" fill="#FFFFFF" opacity="0.38" stroke="#D0DCE8"/>

  <text x="118" y="225" class="label">EXTERNAL INPUTS</text>
  <rect class="box" x="110" y="255" width="250" height="120" rx="24"/>
  <rect class="box-accent" x="110" y="255" width="250" height="16" rx="24"/>
  <text x="135" y="300" class="box-title">Crypto Universe</text>
  <text x="135" y="332" class="box-copy">Binance Public WS</text>
  <text x="135" y="356" class="box-copy">OKX Public WS</text>
  <text x="135" y="380" class="box-copy">Bybit Public Market Data</text>

  <rect class="box" x="110" y="470" width="250" height="145" rx="24"/>
  <rect class="box-accent" x="110" y="470" width="250" height="16" rx="24"/>
  <text x="135" y="515" class="box-title">External Services</text>
  <text x="135" y="547" class="box-copy">Bybit Private WS / REST</text>
  <text x="135" y="571" class="box-copy">via WARP SOCKS5 proxy</text>
  <text x="135" y="595" class="box-copy">Telegram alerts</text>

  <text x="424" y="225" class="label">SINGLE PYTHON PROCESS</text>

  <rect class="box" x="410" y="255" width="250" height="130" rx="24"/>
  <rect class="box-accent" x="410" y="255" width="250" height="16" rx="24"/>
  <text x="435" y="300" class="box-title">Key 1: Data Engine</text>
  <text x="435" y="332" class="box-copy">CCXT Pro ingestion</text>
  <text x="435" y="356" class="box-copy">Normalization</text>
  <text x="435" y="380" class="box-copy">Bad-tick filtering</text>

  <rect class="box" x="720" y="255" width="250" height="130" rx="24"/>
  <rect class="box-accent" x="720" y="255" width="250" height="16" rx="24"/>
  <text x="745" y="300" class="box-title">Key 2: Alpha Bridge</text>
  <text x="745" y="332" class="box-copy">VWAP, skew, lead-lag</text>
  <text x="745" y="356" class="box-copy">Regime + entry filters</text>
  <text x="745" y="380" class="box-copy">AI analyst only if ambiguous</text>

  <rect class="box" x="1030" y="255" width="250" height="130" rx="24"/>
  <rect class="box-accent" x="1030" y="255" width="250" height="16" rx="24"/>
  <text x="1055" y="300" class="box-title">Key 3: Risk Gate</text>
  <text x="1055" y="332" class="box-copy">Liquidity check</text>
  <text x="1055" y="356" class="box-copy">Spread health</text>
  <text x="1055" y="380" class="box-copy">Circuit breaker stop</text>

  <rect class="box" x="410" y="470" width="250" height="150" rx="24"/>
  <rect class="box-accent" x="410" y="470" width="250" height="16" rx="24"/>
  <text x="435" y="515" class="box-title">Key 4: Bybit Executor</text>
  <text x="435" y="547" class="box-copy">Private WS through WARP</text>
  <text x="435" y="571" class="box-copy">Post-Only → Reprice → Market</text>
  <text x="435" y="595" class="box-copy">Immediate exchange-side SL</text>

  <rect class="box" x="720" y="470" width="250" height="150" rx="24"/>
  <rect class="box-accent" x="720" y="470" width="250" height="16" rx="24"/>
  <text x="745" y="515" class="box-title">Key 5: State Manager</text>
  <text x="745" y="547" class="box-copy">Trade and risk logging</text>
  <text x="745" y="571" class="box-copy">Postgres sync</text>
  <text x="745" y="595" class="box-copy">Startup reconciliation</text>

  <rect class="box" x="1030" y="470" width="250" height="150" rx="24"/>
  <rect class="box-accent" x="1030" y="470" width="250" height="16" rx="24"/>
  <text x="1055" y="515" class="box-title">Key 6: Watchdog</text>
  <text x="1055" y="547" class="box-copy">Heartbeats + stale feed pause</text>
  <text x="1055" y="571" class="box-copy">Latency tracking + SOR fallback</text>
  <text x="1055" y="595" class="box-copy">Dead man's switch + loop lag kill</text>

  <text x="118" y="705" class="label">PERSISTENCE AND ALERTING</text>

  <rect class="box" x="410" y="735" width="250" height="115" rx="24"/>
  <rect class="box-accent" x="410" y="735" width="250" height="16" rx="24"/>
  <text x="435" y="780" class="box-title">PostgreSQL</text>
  <text x="435" y="812" class="box-copy">Trades, signals, state logs</text>

  <rect class="box" x="720" y="735" width="250" height="115" rx="24"/>
  <rect class="box-accent" x="720" y="735" width="250" height="16" rx="24"/>
  <text x="745" y="780" class="box-title">Prometheus</text>
  <text x="745" y="812" class="box-copy">Metrics scraping and monitoring</text>

  <rect class="box" x="1030" y="735" width="250" height="115" rx="24"/>
  <rect class="box-accent" x="1030" y="735" width="250" height="16" rx="24"/>
  <text x="1055" y="780" class="box-title">Telegram</text>
  <text x="1055" y="812" class="box-copy">Critical alerts and operator visibility</text>

  <path class="arrow" d="M360 315 H410"/>
  <path class="arrow" d="M660 320 H720"/>
  <path class="arrow" d="M970 320 H1030"/>
  <path class="arrow" d="M1155 385 V430 H535 V470"/>
  <path class="arrow" d="M660 545 H720"/>
  <path class="arrow" d="M360 540 H410"/>
  <path class="arrow" d="M535 620 V675 H535 V735"/>

  <path class="arrow-muted" d="M1155 620 V675 H845 V735"/>
  <path class="arrow-muted" d="M1185 620 V675 H1155 V735"/>
  <path class="arrow-muted" d="M1155 470 V430 H535 V385"/>
  <path class="arrow-muted" d="M1155 470 V430 H1155 V385"/>
  <path class="arrow-muted" d="M1280 545 H1340 V792 H1280"/>

  <rect class="pill" x="470" y="658" width="730" height="42" rx="12"/>
  <text x="495" y="685" class="small-copy">Execution loop: fill received → place exchange-side stop loss immediately → log state → watchdog tracks latency and health</text>

  <rect class="pill" x="410" y="875" width="870" height="40" rx="12"/>
  <text x="435" y="901" class="small-copy">Hot path stays deterministic; AI remains off-path and can only reject entries or flag exits, never force a trade.</text>
</svg>
