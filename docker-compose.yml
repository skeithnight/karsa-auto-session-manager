# Karsa ASM — 5-Container Fleet + Infrastructure
# See: docs/plan/backtest-shadow/BLUEPRINT_BACKTEST_SHADOW.md
#
# Container fleet:
#   karsa-data-engine  — shared WS proxy, data normalization, Redis Pub/Sub
#   karsa-live         — real trades, routed through gluetun VPN
#   karsa-shadow       — virtual trades (Shadow Mode)
#   karsa-backtest     — historical backtesting worker
#   karsa-commander    — Telegram bot (risk selection, dashboards, auto-adjust)
#
# Networks:
#   karsa-backend  — internal only (app <-> infra)
#   karsa-frontend — external (commander only, for Telegram API)
#
# CRITICAL: karsa-live routes through gluetun (network_mode: "service:gluetun")

services:
  # -- Infrastructure ---------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: karsa-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-karsa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-karsa}
      POSTGRES_DB: ${POSTGRES_DB:-karsa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-karsa} -d ${POSTGRES_DB:-karsa}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - karsa-backend

  redis:
    image: redis:7-alpine
    container_name: karsa-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - karsa-backend

  # -- VPN (WireGuard via gluetun) --------------------------------

  gluetun:
    image: qmcgaw/gluetun
    container_name: karsa-gluetun
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - VPN_SERVICE_PROVIDER=custom
      - VPN_TYPE=wireguard
      - WIREGUARD_PRIVATE_KEY=${WIREGUARD_PRIVATE_KEY}
      - WIREGUARD_ADDRESSES=${WIREGUARD_ADDRESSES}
      - WIREGUARD_ENDPOINT_IP=${WIREGUARD_ENDPOINT_IP}
      - WIREGUARD_ENDPOINT_PORT=${WIREGUARD_ENDPOINT_PORT:-51820}
      - WIREGUARD_PUBLIC_KEY=${WIREGUARD_PUBLIC_KEY}
      - FIREWALL_OUTBOUND_SUBNETS=172.28.0.0/16,172.17.0.0/16
      - FIREWALL_INPUT_SUBNETS=172.28.0.0/16,172.17.0.0/16
    volumes:
      - gluetun_data:/gluetun
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9999/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - karsa-backend

  # -- 9router (AI proxy) -----------------------------------------

  9router:
    image: 9router:latest
    container_name: karsa-9router
    restart: unless-stopped
    env_file: .env
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    volumes:
      - 9router_data:/data

  # -- Karsa Data Engine (shared WS proxy) ------------------------

  karsa-data-engine:
    build: .
    container_name: karsa-data-engine
    restart: unless-stopped
    env_file: .env
    environment:
      - KARSA_ROLE=data-engine
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts

  # -- Karsa Live (real trades, VPN-routed) -----------------------

  karsa-live:
    build: .
    container_name: karsa-live
    restart: unless-stopped
    env_file: .env
    environment:
      - KARSA_ROLE=live
      - SHADOW_MODE_ENABLED=false
    network_mode: "service:gluetun"
    depends_on:
      gluetun:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      9router:
        condition: service_started
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts

  # -- Karsa Shadow (virtual trades) ------------------------------

  karsa-shadow:
    build: .
    container_name: karsa-shadow
    restart: unless-stopped
    env_file: .env
    environment:
      - KARSA_ROLE=shadow
      - SHADOW_MODE_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    networks:
      - karsa-backend

  # -- Karsa Backtest (historical worker) -------------------------

  karsa-backtest:
    build: .
    container_name: karsa-backtest
    restart: unless-stopped
    env_file: .env
    environment:
      - KARSA_ROLE=backtest
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    networks:
      - karsa-backend

  # -- Karsa Commander (Telegram bot) -----------------------------

  karsa-commander:
    build: .
    container_name: karsa-commander
    restart: unless-stopped
    env_file: .env
    environment:
      - KARSA_ROLE=commander
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    networks:
      - karsa-backend
      - karsa-frontend

  # -- Monitoring --------------------------------------------------

  prometheus:
    image: prom/prometheus:latest
    container_name: karsa-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - karsa-backend
      - karsa-frontend

  grafana:
    image: grafana/grafana:latest
    container_name: karsa-grafana
    restart: unless-stopped
    environment:
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/signal-confidence.json
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    networks:
      - karsa-backend
      - karsa-frontend

# -- Networks -------------------------------------------------------

networks:
  karsa-backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
  karsa-frontend:
    driver: bridge

# -- Volumes --------------------------------------------------------

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  9router_data:
  gluetun_data:
